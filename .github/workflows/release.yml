name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync package version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bun x json -I -f packages/cli/package.json -e "this.version='${VERSION}'"

      - name: Build web assets
        run: cd packages/web && bun run build

      - name: Build binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64    packages/cli/src/index.ts --outfile dist/pramid-linux-x64
          bun build --compile --target=bun-linux-arm64  packages/cli/src/index.ts --outfile dist/pramid-linux-arm64
          bun build --compile --target=bun-darwin-x64   packages/cli/src/index.ts --outfile dist/pramid-darwin-x64
          bun build --compile --target=bun-darwin-aarch64 packages/cli/src/index.ts --outfile dist/pramid-darwin-arm64
          bun build --compile --target=bun-windows-x64  packages/cli/src/index.ts --outfile dist/pramid-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pramid-linux-x64
            dist/pramid-linux-arm64
            dist/pramid-darwin-x64
            dist/pramid-darwin-arm64
            dist/pramid-windows-x64.exe
          generate_release_notes: true
